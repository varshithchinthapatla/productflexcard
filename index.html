<!DOCTYPE html>
<html>
    <head>
        <title>PRODUCT CARD</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <!--card starts-->
        <div class="card">
            
            <img src="https://i.pinimg.com/1200x/37/30/e6/3730e67348bc2602821ca4f52db39530.jpg" alt="DRONE VIDEO" class="product-img">
            
            <div>
            <div class="product-name">FLYING DRONE</div>
            <p class="price">$199</p>
            <p class="description">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            <button class="add-to-cart"><i class="fa-solid fa-cart-plus"></i>Add To Cart</button>
            </div>
            <div class="discount">20% OFF
            </div>
        </div>
        <!--card ends-->

    </body>
</html>
